name: CI Pipeline

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 bandit

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Run lint
        run: |
          flake8 .

      - name: Run security scan
        run: |
          bandit -r . -x tests
