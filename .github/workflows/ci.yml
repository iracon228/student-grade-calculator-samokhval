name: CI Pipeline

on:
  pull_request:
    branches:
      - master  # Виконується на будь-якому Pull Request у гілку master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m unittest discover tests/

      - name: Linting (flake8)
        run: |
          pip install flake8
          flake8 .

      - name: Static analysis (Bandit)
        run: |
          pip install bandit
          bandit -r .
